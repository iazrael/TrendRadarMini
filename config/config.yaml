# TrendRadar New Version - Configuration File

# AI配置
ai:
  api_key: "sk-xxxxxxxxxxxxxxxx"
  base_url: "http://192.168.200.34:11434/v1"
  model: "qwen3:30b"
  max_tokens: 8000
  temperature: 0.7

# 数据源配置
crawler:
  sources:
    - id: "weibo"
      name: "微博热搜"
      alias: "微博"
    - id: "zhihu"
      name: "知乎热榜"
      alias: "知乎"
    - id: "36kr"
      name: "36氪快讯"
      alias: "36氪"
    - id: "hackernews"
      name: "Hacker News"
      alias: "HN"

  request_interval: 1000  # 毫秒
  timeout: 10  # 秒
  max_retries: 2

  proxy:
    enabled: false
    url: "http://127.0.0.1:10086"

# 存储配置
storage:
  db_path: "output/trendradar.db"
  batch_size: 100  # 批量插入大小

# 报告配置
report:
  output_dir: "output"

# 日志配置
logging:
  level: "INFO"
  file: "output/trendradar.log"
